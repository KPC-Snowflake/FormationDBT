name: 'tpch_analytics'
version: '1.0.0'

profile: 'tpch_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  tpch_analytics:
    +schema: seeds

snapshots:
  tpch_analytics:
    +target_schema: snapshots

models:
  tpch_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
      +tags: ['daily']
